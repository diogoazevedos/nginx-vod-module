master_process off;
daemon off;

pid /tmp/nginx.pid;
error_log /dev/stderr debug;

events {}

http {
	log_format main '$remote_addr - $remote_user [$time_local] "$request" '
		'$status $body_bytes_sent "$http_referer" '
		'"$http_user_agent" "$http_x_forwarded_for"';

	server_tokens off;

	gzip_vary on;

	access_log /dev/stdout main;

	upstream origin_service {
		least_conn;
		server localhost:8080 max_fails=0;
		keepalive 16;
		keepalive_timeout 5s;
	}

	map $status $cache_control_directives {
		~^2|304 'public, max-age=31536000, immutable';
		default 'public, max-age=3';
	}

	server {
		listen 8000 default_server;
		listen [::]:8000 default_server;

		keepalive_timeout 20s;
		keepalive_requests 10000;

		send_timeout 20s;
		client_header_timeout 5s;

		if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
			return 405;
		}

		vod_drm_upstream_location /drm/;
		vod_drm_request_uri '$playback_token';

		vod_last_modified 'Wed, 09 Apr 2025 14:35:00 GMT';
		vod_last_modified_types *;

		vod_max_mapping_response_size 4k;

		gzip on;
		gzip_types application/dash+xml application/vnd.apple.mpegurl text/vtt;

		reset_timedout_connection on;

		proxy_connect_timeout 1s;
		proxy_send_timeout 3s;
		proxy_read_timeout 5s;

		proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
		proxy_next_upstream_tries 2;
		proxy_next_upstream_timeout 0;

		proxy_buffers 16 32k;
		proxy_buffer_size 64k;
		proxy_busy_buffers_size 128k;
		proxy_max_temp_file_size 0;

		proxy_http_version 1.1;

		proxy_ssl_session_reuse on;

		vod_mode mapped;

		vod_upstream_location /mapping/;
		vod_media_set_map_uri '$playback_token';
		vod_remote_upstream_location /storage/;

		location ^~ /mapping/ {
			internal;
			proxy_pass http://origin_service/mapping/;
			include keepalive.conf;
		}

		location ^~ /drm/ {
			internal;
			proxy_pass http://origin_service/drm/;
			include keepalive.conf;
		}

		location ^~ /storage/ {
			internal;
			proxy_pass http://origin_service/storage/;
			include keepalive.conf;
		}

		vod_segment_duration 2000;

		vod_align_segments_to_key_frames on;
		vod_manifest_segment_durations_mode accurate;

		vod_drm_single_key on;
		vod_drm_clear_lead_segment_count 0;

		vod_hls_container_format auto;
		vod_hls_absolute_index_urls off;
		vod_hls_absolute_master_urls off;
		vod_hls_master_file_name_prefix '';

		vod_dash_profiles 'urn:mpeg:dash:profile:isoff-live:2011';
		vod_dash_absolute_manifest_urls off;
		vod_dash_manifest_file_name_prefix '';

		location ~ ^/clear/(?<playback_token>[^/]+)/(?:\.mpd|sub-.+)$ {
			vod dash;
			vod_dash_fragment_file_name_prefix 'seg';
			add_header Cache-Control $cache_control_directives always;
			include cors.conf;
		}

		location ~ ^/clear/(?<playback_token>[^/]+)/ {
			vod hls;
			add_header Cache-Control $cache_control_directives always;
			include cors.conf;
		}

		location ~ ^/cenc/(?<playback_token>[^/]+)/(?:\.mpd|sub-.+)$ {
			vod dash;
			vod_drm_enabled on;
			vod_dash_fragment_file_name_prefix 'seg';
			add_header Cache-Control $cache_control_directives always;
			include cors.conf;
		}

		location ~ ^/cenc/(?<playback_token>[^/]+)/ {
			vod hls;
			vod_drm_enabled on;
			vod_hls_version 6;
			vod_hls_encryption_method sample-aes-ctr;
			add_header Cache-Control $cache_control_directives always;
			include cors.conf;
		}

		location ~ ^/cbcs/(?<playback_token>[^/]+)/ {
			vod hls;
			vod_drm_enabled on;
			vod_hls_version 5;
			vod_hls_encryption_key_uri 'skd://$vod_set_id';
			vod_hls_encryption_key_format 'com.apple.streamingkeydelivery';
			vod_hls_encryption_key_format_versions '1';
			vod_hls_encryption_method sample-aes;
			add_header Cache-Control $cache_control_directives always;
			include cors.conf;
		}

		location = /vod_status {
			vod_status;
		}
	}
}
